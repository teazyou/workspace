# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# Config version for compatibility and deprecations
# Fallback value (if you omit the key): config-version = 1
config-version = 2

# You can use it to add commands that run after AeroSpace startup.
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
# Run Sketchybar together with AeroSpace
# sketchybar has built-in detection of already running process,
# so it won't be run twice on AeroSpace restart
# Launch JankyBorders with Tokyo Night theme
after-startup-command = [
    'exec-and-forget sketchybar',
    'exec-and-forget borders active_color=0xffe08030 inactive_color=0xff3a2a35 width=3.0 style=round hidpi=on order=above',
    # Default modes at startup: performance mode ON + the bar hidden on secondary
    # monitors. Wait for the bar items to exist, reset the /tmp state files so a
    # (re)start re-establishes the defaults deterministically (the toggle scripts
    # key off these states), then run each toggle from its clean state: no
    # secondary-bar.state => OFF/hidden, no performance-mode.state => ON.
    'exec-and-forget for i in {1..20}; do sketchybar --query volume >/dev/null 2>&1 && break; sleep 0.3; done; rm -f /tmp/performance-mode.state /tmp/secondary-bar.state; "$HOME"/workspace/configs/aerospace/secondary-bar-toggle.sh; "$HOME"/workspace/configs/aerospace/performance-mode.sh'
]

# Notify Sketchybar about workspace change + track workspace MRU for the
# empty-workspace-watcher daemon (see com.aerospace.empty-watcher.plist).
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE; ~/workspace/configs/aerospace/track-workspace-mru.sh "$AEROSPACE_FOCUSED_WORKSPACE"'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Mouse-follows-focus is intentionally NOT global. on-focus-changed fires for
# EVERY focus change — including the mouse-driven ones AutoRaise triggers when the
# cursor crosses a window border — so a global 'move-mouse' here recentered the
# cursor whenever you merely moused over another window (annoying). Instead the
# warp is attached explicitly to the keyboard / app-switch bindings below
# (alt+hjkl focus, alt+1-9 & alt-tab workspace, alt-shift+1-9 move-follow) and to
# open-dock-app.sh (cmd+1-9). That way only deliberate shortcut-driven focus
# changes recenter the cursor; manual mouse movement never does.
# Still pairs with AutoRaise's focus-follows-mouse (see configs/autoraise/): after
# a keyboard focus change the cursor is warped onto the new window, so AutoRaise
# won't immediately yank focus back to wherever the cursor used to be.
on-focus-changed = []

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# List of workspaces that should stay alive even when they contain no windows,
# even when they are invisible.
# This config version is only available since 'config-version = 2'
# Fallback value (if you omit the key): persistent-workspaces = []
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]

# Assign workspaces to specific monitors
# Workspaces 1-6 -> Main monitor (HDMI, menu-bar display)
# Workspaces 7-9 -> Secondary monitor (Built-in Retina)
# Workspace  0   -> Third monitor (Sidecar / AirPlay), only when connected
# Note: 7-9 and 0 use name regexes (not 'secondary'), which is only defined
# for 2-monitor setups — with 3 monitors connected 'secondary' leaked ws9
# onto the main display. Name regexes pin each to its real monitor.
[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'main'
    7 = 'built-in.*'
    8 = 'built-in.*'
    9 = 'built-in.*'
    0 = 'sidecar.*'

# A callback that runs every time binding mode changes
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
on-mode-changed = []

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
    preset = 'qwerty'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
    inner.horizontal = 10
    inner.vertical =   10
    outer.left =       5
    outer.bottom =     5
    # Top gap for SketchyBar on all monitors
    outer.top =        [{ monitor."built-in.*" = 4 }, { monitor.main = 42 }, 5]
    outer.right =      5

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    # All possible commands: https://nikitabobko.github.io/AeroSpace/commands

    # See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
    # You can uncomment the following lines to open up terminal with alt + enter shortcut
    # (like in i3)
    # alt-enter = '''exec-and-forget osascript -e '
    # tell application "Terminal"
    #     do script
    #     activate
    # end tell'
    # '''

    # See: https://nikitabobko.github.io/AeroSpace/commands#layout
    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    # See: https://nikitabobko.github.io/AeroSpace/commands#focus
    # Append move-mouse so the cursor follows keyboard focus to the new window
    # (mouse-follows-focus is no longer a global on-focus-changed callback — see
    # above). The warp also keeps AutoRaise from yanking focus back to the window
    # the cursor was sitting over.
    alt-h = ['focus left', 'move-mouse window-lazy-center']
    alt-j = ['focus down', 'move-mouse window-lazy-center']
    alt-k = ['focus up', 'move-mouse window-lazy-center']
    alt-l = ['focus right', 'move-mouse window-lazy-center']

    # See: https://nikitabobko.github.io/AeroSpace/commands#move
    # Append move-mouse so the cursor trails the moved window: a 'move' keeps focus
    # on the same window (no focus change), so on-focus-changed won't fire and the
    # cursor would otherwise be left stranded over whatever slid under it. Keeping
    # cursor+focus together means AutoRaise won't hijack focus on the next mouse nudge.
    alt-shift-h = ['move left', 'move-mouse window-lazy-center']
    alt-shift-j = ['move down', 'move-mouse window-lazy-center']
    alt-shift-k = ['move up', 'move-mouse window-lazy-center']
    alt-shift-l = ['move right', 'move-mouse window-lazy-center']

    # See: https://nikitabobko.github.io/AeroSpace/commands#resize
    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace
    # move-mouse appended so the cursor lands on the focused window of the
    # switched-to workspace (mouse-follows-focus is no longer global).
    alt-1 = ['workspace 1', 'move-mouse window-lazy-center']
    alt-2 = ['workspace 2', 'move-mouse window-lazy-center']
    alt-3 = ['workspace 3', 'move-mouse window-lazy-center']
    alt-4 = ['workspace 4', 'move-mouse window-lazy-center']
    alt-5 = ['workspace 5', 'move-mouse window-lazy-center']
    alt-6 = ['workspace 6', 'move-mouse window-lazy-center']
    alt-7 = ['workspace 7', 'move-mouse window-lazy-center']
    alt-8 = ['workspace 8', 'move-mouse window-lazy-center']
    alt-9 = ['workspace 9', 'move-mouse window-lazy-center']
    alt-0 = ['workspace 0', 'move-mouse window-lazy-center']
    # alt-a = 'workspace A' # In your config, you can drop workspace bindings that you don't need

    # See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
    # Each move also triggers sketchybar update to refresh workspace app lists
    # --focus-follows-window: switch to the destination workspace after the move
    alt-shift-1 = ['move-node-to-workspace --focus-follows-window 1', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-2 = ['move-node-to-workspace --focus-follows-window 2', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-3 = ['move-node-to-workspace --focus-follows-window 3', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-4 = ['move-node-to-workspace --focus-follows-window 4', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-5 = ['move-node-to-workspace --focus-follows-window 5', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-6 = ['move-node-to-workspace --focus-follows-window 6', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-7 = ['move-node-to-workspace --focus-follows-window 7', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-8 = ['move-node-to-workspace --focus-follows-window 8', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-9 = ['move-node-to-workspace --focus-follows-window 9', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    alt-shift-0 = ['move-node-to-workspace --focus-follows-window 0', 'move-mouse window-lazy-center', 'exec-and-forget sketchybar --trigger aerospace_workspace_change']
    # alt-shift-a = 'move-node-to-workspace A'

    # See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
    alt-tab = ['workspace-back-and-forth', 'move-mouse window-lazy-center']
    # See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # See: https://nikitabobko.github.io/AeroSpace/commands#mode
    alt-shift-semicolon = 'mode service'

    # App launchers (cmd + number) - opens Dock app by position (0-indexed)
    # Rearrange your Dock to change which app each shortcut opens
    cmd-backtick = 'exec-and-forget open -a Finder'
    cmd-1 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 0'
    cmd-2 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 1'
    cmd-3 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 2'
    cmd-4 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 3'
    cmd-5 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 4'
    cmd-6 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 5'
    cmd-7 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 6'
    cmd-8 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 7'
    cmd-9 = 'exec-and-forget ~/workspace/configs/aerospace/open-dock-app.sh 8'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
    backspace = ['close-all-windows-but-current', 'mode main']

    # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
    #s = ['layout sticky tiling', 'mode main']

    p = ['exec-and-forget ~/workspace/configs/aerospace/performance-mode.sh', 'mode main'] # Performance mode toggle
    b = ['exec-and-forget ~/workspace/configs/aerospace/secondary-bar-toggle.sh', 'mode main'] # Toggle SketchyBar on secondary monitor
    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

# Float CrossOver windows so AeroSpace doesn't try to tile game windows
[[on-window-detected]]
if.app-id = 'com.codeweavers.CrossOver'
run = 'layout floating'

# Float Stickies notes so AeroSpace leaves them untiled (Stickies handles its own
# always-on-top / "Float on Top" z-order itself)
[[on-window-detected]]
if.app-id = 'com.apple.Stickies'
run = 'layout floating'
